<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    overflow: hidden;
    transition: background 1.5s ease;
}

body.dim {
    background: radial-gradient(circle, rgba(255,255,255,0.1), rgba(0,0,0,0.95));
}

.container {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 25px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    width: 360px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ✅ IMAGE FIX (AUTO PORTRAIT/LANDSCAPE) */
img {
    width: 100%;
    max-height: 220px;
    object-fit: contain; /* 🔥 no crop */
    border-radius: 15px;
    margin-bottom: 10px;
    background: rgba(0,0,0,0.2);
}

.content {
    overflow-y: auto;
    flex: 1;
}

.content::-webkit-scrollbar {
    width: 0;
}

.buttons {
    margin-top: 10px;
}

button {
    margin: 8px auto;
    padding: 12px 22px;
    border-radius: 25px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-weight: bold;
    cursor: pointer;
}

/* LETTER */
.line {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 1s forwards;
    margin: 6px 0;
}

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}

.highlight {
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,255,255,0.9);
}

/* hearts */
.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
const name = "Bubu";
let index = 0;

document.body.addEventListener("click", () => {
    document.getElementById("music").play();
}, { once: true });

function render() {
    const app = document.getElementById("app");

    if (index === 0) {
        app.innerHTML = `
        <div class="content">
            <h2>Do you love me, ${name}? 🥺</h2>
        </div>
        <div class="buttons">
            <button onclick="next()">Yes 💖</button>
            <button onclick="reaction('fake')">Maybe 😏</button>
        </div>`;
    }

    else if (index === 1) {
        app.innerHTML = `
        <div class="content">
            <h2>Who is the cutest? 😚</h2>
        </div>
        <div class="buttons">
            <button onclick="reaction('correct')">Me 😎</button>
            <button onclick="reaction('wrong')">You 😚</button>
            <button onclick="reaction('best')">Our future babies 👶❤️</button>
        </div>`;
    }

    else if (index === 2) {
        app.innerHTML = `
        <div class="content">
            <img src="photo1.jpeg">
            <h2>Will you stay with me forever, ${name}? 💍</h2>
        </div>
        <div class="buttons">
            <button onclick="next()">Forever 💖</button>
        </div>`;
    }

    else if (index === 3) {
        app.innerHTML = `
        <div class="content">
            <img src="photo2.jpeg">
            <h2>Do I make you smile? 😊</h2>
        </div>
        <div class="buttons">
            <button onclick="next()">Always 😍</button>
        </div>`;
    }

    else {
        document.body.classList.add("dim");

        app.innerHTML = `
        <div class="content" id="scrollBox">
            <img src="photo3.jpeg">
            <div id="letter"></div>
        </div>`;

        showLetter();
    }
}

function next() {
    index++;
    render();
}

function reaction(type) {
    if (type === "wrong") alert("Wrong answer 😤 Try again!");
    else if (type === "correct") { alert("Obviously 😎"); next(); }
    else if (type === "best") { alert("Future planning already 😳❤️"); next(); }
    else if (type === "fake") alert("Maybe?? 😤 Fix your answer.");
}

function showLetter() {
    const lines = [
        `Hey ${name}...`,
        `I don't even know where to start.`,
        `You changed something in me.`,
        `In the best way possible.`,
        ``,
        `There were times I didn’t say it...`,
        `But I felt it.`,
        ``,
        `And honestly...`,
        `This scares me a little.`,
        ``,
        `⏸️`,
        ``,
        `But if there's one thing I'm sure about...`,
        ``,
        `It's you.`,
        ``,
        `💍 I LOVE YOU ${name} ❤️`
    ];

    const container = document.getElementById("letter");
    const scrollBox = document.getElementById("scrollBox");

    let delay = 0;

    lines.forEach((line) => {
        if (line === "⏸️") {
            delay += 2.5;
            return;
        }

        const div = document.createElement("div");
        div.className = "line";

        if (line.includes("I LOVE YOU")) {
            div.classList.add("highlight");
        }

        setTimeout(() => {
            div.innerText = line;
            container.appendChild(div);

            // 🔥 FORCE SCROLL TO BOTTOM
            scrollBox.scrollTop = scrollBox.scrollHeight;
        }, delay * 1000);

        delay += line === "" ? 0.6 : 1.4;
    });

    // 🔥 FINAL GUARANTEE SCROLL
    setTimeout(() => {
        scrollBox.scrollTop = scrollBox.scrollHeight;
    }, delay * 1000 + 500);
}

// hearts
setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}, 300);

render();
</script>

</body>
</html>
